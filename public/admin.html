<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — ExpenseStory</title>
  <link rel="stylesheet" href="/css/neo.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="admin-body">  <div id="admin-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/data.js"></script>
  <script src="/js/components/navbar.js"></script>
  <script src="/js/components/storycard.js"></script>
  <script src="/js/components/expensedrawer.js"></script>
  <script src="/js/pages/admin.js"></script>
  <script>
    window.renderIcons = () => { if (window.lucide) lucide.createIcons(); };

    (async () => {
      await AppConfig.init();
      const root = document.getElementById('admin-root');

      // Check if already logged in as admin
      if (AppConfig.isConnected()) {
        const { data: { session } } = await AppConfig.supabase.auth.getSession();
        if (session && AppConfig.isAdmin(session.user.email)) {
          renderAdminDashboard(root, session.user);
          return;
        }
      }

      // Show admin login form
      renderAdminLogin(root);
    })();

    function renderAdminLogin(root) {
      root.innerHTML = `
        <div class="auth-wrap">
          <div class="auth-left">
            <div class="brand"><i data-lucide="shield-check"></i> Admin Portal</div>
            <h2>ExpenseStory Analytics</h2>
            <p>Restricted access. Authorised personnel only.</p>
            <div class="auth-features">
              <div class="auth-feature"><i data-lucide="users"></i> User analytics</div>
              <div class="auth-feature"><i data-lucide="bar-chart-2"></i> Platform metrics</div>
              <div class="auth-feature"><i data-lucide="activity"></i> Live expense feed</div>
            </div>
          </div>
          <div class="auth-right">
            <div class="auth-box">
              <h1><i data-lucide="lock"></i> Admin Login</h1>
              <p class="auth-sub">Sign in with your admin email to continue.</p>
              <div id="admin-error"></div>
              <div class="form-group">
                <label>Admin Email</label>
                <input type="email" id="admin-email" placeholder="admin@example.com" autocomplete="email"/>
              </div>
              <div class="form-group" style="position:relative">
                <label>Password</label>
                <input type="password" id="admin-password" placeholder="••••••••" autocomplete="current-password"/>
              </div>
              <button class="btn btn-dark auth-submit-btn" id="admin-login-btn">
                <i data-lucide="log-in"></i> Access Analytics
              </button>
            </div>
          </div>
        </div>`;

      renderIcons();

      document.getElementById('admin-login-btn').addEventListener('click', handleAdminLogin);
      document.getElementById('admin-password').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleAdminLogin();
      });
    }

    async function handleAdminLogin() {
      const email    = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      const errEl    = document.getElementById('admin-error');
      const btn      = document.getElementById('admin-login-btn');
      errEl.innerHTML = '';

      if (!email || !password) {
        errEl.innerHTML = '<div class="error-msg">Fill in all fields.</div>';
        return;
      }

      // Block non-admin emails before even hitting Supabase
      if (!AppConfig.isAdmin(email)) {
        errEl.innerHTML = '<div class="error-msg">Access denied. Not an admin account.</div>';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader"></i> Verifying...';
      renderIcons();

      try {
        const { data, error } = await AppConfig.supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        renderAdminDashboard(document.getElementById('admin-root'), data.user);
      } catch(e) {
        errEl.innerHTML = `<div class="error-msg">${e.message}</div>`;
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="log-in"></i> Access Analytics';
        renderIcons();
      }
    }

    async function renderAdminDashboard(root, user) {
      // Inject navbar root + app div then hand off to AdminPage
      root.innerHTML = `<div id="navbar-root"></div><div id="app"></div>`;
      await AdminPage.render();

      // Add logout to navbar
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async (e) => {
          e.preventDefault();
          await AppConfig.supabase.auth.signOut();
          renderAdminLogin(root);
        });
      }
    }
  </script>
</body>
</html>
